<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeSoft Calculator</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        font-family: Arial, sans-serif;
        gap: 20px;
    }

    .calculator {
        background: #111;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 30px cyan, 0 0 60px blue;
        width: 300px;
    }

    .title {
        text-align: center;
        color: cyan;
        font-size: 24px;
        margin-bottom: 10px;
        text-shadow: 0 0 10px cyan;
    }

    .display {
        width: 100%;
        height: 60px;
        background: #000;
        color: #0f0;
        font-size: 28px;
        text-align: right;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: inset 0 0 10px #0f0;
        overflow-x: auto;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 10px white;
    }

    .num {
        background: #222;
        color: white;
    }

    .operator {
        background: orange;
        color: white;
        box-shadow: 0 0 10px orange;
    }

    .equal {
        background: limegreen;
        color: white;
        grid-column: span 2;
        box-shadow: 0 0 15px lime;
    }

    .clear {
        background: red;
        color: white;
        box-shadow: 0 0 10px red;
    }

    /* History Panel */
    .history {
        width: 200px;
        height: 400px;
        background: #111;
        border-radius: 20px;
        box-shadow: 0 0 20px purple;
        padding: 15px;
        color: white;
        overflow-y: auto;
    }

    .history h3 {
        text-align: center;
        color: violet;
        text-shadow: 0 0 10px violet;
    }

    .history-item {
        margin: 5px 0;
        padding: 5px;
        border-bottom: 1px solid #444;
        font-size: 14px;
    }

    /* Toggle Button */
    .toggle-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        border-radius: 10px;
        border: none;
        background: cyan;
        color: black;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 10px cyan;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
        body {
            flex-direction: column;
            height: auto;
            padding: 20px;
        }

        .calculator {
            width: 100%;
            max-width: 350px;
        }

        .history {
            width: 100%;
            max-width: 350px;
            height: 200px;
        }

        .toggle-btn {
            position: static;
            margin-bottom: 10px;
        }
    }

    @media (max-width: 480px) {
        .display {
            font-size: 22px;
            height: 50px;
        }

        button {
            padding: 12px;
            font-size: 16px;
        }

        .title {
            font-size: 20px;
        }
    }
</style>

</head>
<body>

<!-- Toggle Button -->
<button class="toggle-btn" onclick="toggleHistory()">Toggle History</button>

<!-- Calculator -->
<div class="calculator">
    <div class="title">⚡ CodeSoft Calculator</div>
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
    </div>
</div>

<!-- History Panel -->
<div class="history">
    <h3>History</h3>
    <div id="historyList"></div>
</div>

<script>
    let display = document.getElementById("display");
    let historyList = document.getElementById("historyList");

    function append(value) {
        if (display.innerText === "0") {
            display.innerText = value;
        } else {
            display.innerText += value;
        }
    }

    function clearDisplay() {
        display.innerText = "0";
    }

    function calculate() {
        try {
            let expression = display.innerText;
            let result = eval(expression);

            let div = document.createElement("div");
            div.className = "history-item";
            div.innerText = expression + " = " + result;
            historyList.prepend(div);

            display.innerText = result;
        } catch {
            display.innerText = "Error";
        }
    }

    function toggleHistory() {
        let historyPanel = document.querySelector(".history");
        historyPanel.style.display =
            historyPanel.style.display === "none" ? "block" : "none";
    }

    document.addEventListener("keydown", function(e) {
        let key = e.key;

        if (!isNaN(key) || "+-*/.".includes(key)) {
            append(key);
        } else if (key === "Enter") {
            calculate();
        } else if (key === "Backspace") {
            display.innerText = display.innerText.slice(0, -1) || "0";
        } else if (key.toLowerCase() === "c") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
